  mt:
    localisedName: "vulnz"
    shortDescription: >
      Aggregatur ta' data dwar vulnerabbiltajiet għall-konformità ma' EU-CRA u
      NIS2, b'ENISA EUVD, BSI CERT-Bund, CERT-FR/ANSSI, KEV u 23 sors ieħor.
    longDescription: >
      vulnz huwa aggregatur ta' data dwar vulnerabbiltajiet ta' prestazzjoni
      għolja distribwit bħala fajl binarju Go uniku mingħajr dipendenzi
      tal-ħin tal-eżekuzzjoni esterni. Is-softwer jiġbor, jittrasforma u
      jaħżen data dwar vulnerabbiltajiet minn 28 fornitur f'skema JSON
      unifikata, b'fokus primarju fuq il-konformità mal-EU Cyber Resilience
      Act (CRA) u NIS2.

      Il-feeds speċifiċi tal-UE koperti jinkludu l-Bażi tad-Data tal-UE dwar
      il-Vulnerabbiltajiet ta' ENISA (EUVD), id-dump konsolidat ta' ENISA ta'
      vulnerabbiltajiet sfruttati magħrufa (KEV), BSI CERT-Bund (l-Uffiċċju
      Federali Ġermaniż għas-Sigurtà tal-Informazzjoni, CSAF 2.0) u
      CERT-FR/ANSSI (l-Aġenzija Nazzjonali Franċiża taċ-Ċibersigurtà). Dawn
      il-fornituri jipprovdu oqsma ta' data strutturati inklużi bandieri
      `exploited_in_wild`, timestamps `exploitedSince` minn ENISA,
      mapings ta' severità BSI TR-03116 u identifikaturi ta' traċċar ANSSI.

      Lil hinn mill-feeds tal-UE, vulnz jaggrega data mill-bażijiet tad-data
      ewlenin tas-sigurtà tad-distribuzzjonijiet tal-OS (Alpine, Debian, Ubuntu,
      RHEL, Amazon, Oracle, SUSE, Rocky, Alma, Fedora, Arch, Wolfi, Chainguard,
      Mariner, Minimos, SecureOS, Photon, Bitnami), l-API NVD CVE, l-iskor
      tal-previżjoni tal-isfruttament EPSS u data taċ-ċiklu tal-ħajja
      end-of-life — kollha normalizzati għall-istess skema.

      Id-data tinħażen f'backend flat-file jew SQLite. Il-fornituri jitħaddmu
      b'mod konkurrenti b'paralelliżmu konfigurabbli, timeouts per fornitur,
      limitazzjoni tar-rata HTTP per host, backoff esponenzjali u pooling tal-
      konnessjoni. Kull output jiġi validat kontra skema JSON fil-ħin
      tal-eżekuzzjoni. Aġġornamenti inkrementali tal-feeds huma appoġġjati
      permezz tal-immonitorjar tal-timestamps.

      vulnz huwa distribwit bħala fajl binarju statiku uniku mingħajr
      dipendenzi tal-ħin tal-eżekuzzjoni, imfassal għall-integrazzjoni f'
      pipelines ta' konformità awtomatizzati, katini ta' għodod SBOM u
      flussi tax-xogħol tal-ġestjoni tal-vulnerabbiltajiet fl-Istati Membri
      kollha tal-UE.
    documentation: "https://codeberg.org/shift/vulnz/src/branch/main/docs"
    features:
      - "Appoġġ għall-konformità mal-EU Cyber Resilience Act (CRA) u NIS2"
      - "Feeds ENISA EUVD, BSI CERT-Bund, CERT-FR/ANSSI u KEV konsolidat"
      - "28 fornitur ta' data dwar vulnerabbiltajiet f'fajl binarju statiku uniku"
      - "Backends tal-ħażna flat-file u SQLite"
      - "Eżekuzzjoni parallela tal-fornituri b'paralelliżmu konfigurabbli"
      - "Aġġornamenti inkrementali tal-feeds bl-immonitorjar tal-timestamps"
      - "Limitazzjoni tar-rata HTTP, tentattivi mill-ġdid u pooling tal-konnessjoni per host"
      - "Validazzjoni JSON Schema tal-outputs kollha"
      - "L-ebda dipendenzi tal-ħin tal-eżekuzzjoni — fajl binarju Go uniku għal Linux, macOS, Windows"
      - "CLI sħiħ: run, list, status, clear, config, version"


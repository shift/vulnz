  lt:
    localisedName: "vulnz"
    shortDescription: >
      Pažeidžiamumų duomenų agregatorius ES-CRA ir NIS2 atitikčiai, su ENISA
      EUVD, BSI CERT-Bund, CERT-FR/ANSSI, KEV ir 23 kitais šaltiniais.
    longDescription: >
      vulnz yra didelio našumo pažeidžiamumų duomenų agregatorius,
      platinamas kaip vienas Go dvejetainis failas be išorinių vykdymo laiko
      priklausomybių. Programinė įranga renka, transformuoja ir saugo
      pažeidžiamumų duomenis iš 28 teikėjų vieningoje JSON schemoje,
      pirmiausia sutelkiant dėmesį į ES Kiberatsparumo akto (CRA) ir
      NIS2 atitiktį.

      Aprėpti ES specifiniai srautai apima ENISA ES pažeidžiamumų duomenų bazę
      (EUVD), ENISA konsoliduotą žinomų išnaudotų pažeidžiamumų iškrovą (KEV),
      BSI CERT-Bund (Vokietijos federalinis informacijos saugumo biuras,
      CSAF 2.0) ir CERT-FR/ANSSI (Prancūzijos nacionalinė kibernetinio
      saugumo agentūra). Šie teikėjai teikia struktūrizuotus duomenų laukus,
      įskaitant `exploited_in_wild` vėliavėles, ENISA `exploitedSince` laiko
      žymes, BSI TR-03116 sunkumo lygio atvaizdavimus ir ANSSI sekimo
      identifikatorius.

      Be ES srautų, vulnz agreguoja duomenis iš pagrindinių OS distribucijų
      saugumo duomenų bazių (Alpine, Debian, Ubuntu, RHEL, Amazon, Oracle,
      SUSE, Rocky, Alma, Fedora, Arch, Wolfi, Chainguard, Mariner, Minimos,
      SecureOS, Photon, Bitnami), NVD CVE API, EPSS išnaudojimo prognozavimo
      vertinimo ir gyvavimo ciklo pabaigos duomenų — visa tai normalizuota į
      tą pačią schemą.

      Duomenys saugomi flat-file arba SQLite vidinėje sistemoje. Teikėjai
      vykdomi vienu metu su konfigūruojamu lygiagretiškumu, teikėjo
      skirtojo laiko apribojimais, HTTP greičio apribojimu pagal pagrindinį
      kompiuterį, eksponentiniu atsitraukimu ir jungčių telkimu. Visi išvesties
      duomenys patvirtinami pagal JSON schemą vykdymo metu. Laipsniškai
      srautų atnaujinimai palaikomi per laiko žymių sekimą.

      vulnz platinamas kaip vienas statinis dvejetainis failas be vykdymo
      laiko priklausomybių, skirtas integracijai į automatizuotus atitikties
      vamzdynus, SBOM įrankių grandines ir pažeidžiamumų valdymo darbo
      eigas visose ES valstybėse narėse.

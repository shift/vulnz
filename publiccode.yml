      suhtes käitusajal. Järkjärgulisi voo uuendusi toetatakse ajatempli
      jälgimise kaudu.

      vulnz levitatakse ühe staatilise binaarse failina ilma käitusaegsete
      sõltuvusteta, mis on mõeldud integreerimiseks automatiseeritud vastavuse
      konveieritesse, SBOM tööriistaahelatesse ja haavatavuste halduse

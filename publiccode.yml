    features:
      - "ES Kiberatsparumo akto (CRA) ir NIS2 atitikties palaikymas"
      - "ENISA EUVD, BSI CERT-Bund, CERT-FR/ANSSI ir konsoliduotas KEV srautas"
      - "28 pažeidžiamumų duomenų teikėjai viename statiniame dvejetainiame faile"

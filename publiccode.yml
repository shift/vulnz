  lv:
    localisedName: "vulnz"
    shortDescription: >
      Ievainojamības datu agregators ES-CRA un NIS2 atbilstībai, ar ENISA EUVD,
      BSI CERT-Bund, CERT-FR/ANSSI, KEV un 23 citiem avotiem.
    longDescription: >
      vulnz ir augstas veiktspējas ievainojamības datu agregators, kas tiek
      izplatīts kā viens Go binārs fails bez ārējām izpildlaika atkarībām.
      Programmatūra apkopo, pārveido un uzglabā ievainojamības datus no
      28 pakalpojumu sniedzējiem vienotā JSON shēmā, galvenokārt koncentrējoties
      uz ES Kibernoturības akta (CRA) un NIS2 atbilstību.

      Iekļautie ES specifiskie plūsmi ietver ENISA ES ievainojamību datu bāzi
      (EUVD), ENISA konsolidēto zināmo izmantoto ievainojamību izgāztuvi (KEV),
      BSI CERT-Bund (Vācijas Federālais informācijas drošības birojs, CSAF 2.0)
      un CERT-FR/ANSSI (Francijas nacionālā kiberdrošības aģentūra). Šie
      pakalpojumu sniedzēji nodrošina strukturētus datu laukus, tostarp
      `exploited_in_wild` karodziņus, ENISA `exploitedSince` laika zīmogus,
      BSI TR-03116 smaguma kartējumus un ANSSI izsekošanas identifikatorus.

      Papildus ES plūsmām vulnz apkopo datus no galvenajām OS izplatījumu
      drošības datu bāzēm (Alpine, Debian, Ubuntu, RHEL, Amazon, Oracle, SUSE,
      Rocky, Alma, Fedora, Arch, Wolfi, Chainguard, Mariner, Minimos, SecureOS,
      Photon, Bitnami), NVD CVE API, EPSS ekspluatācijas prognozēšanas
      novērtējuma un dzīves cikla beigu datiem — viss normalizēts uz to pašu
      shēmu.

      Dati tiek glabāti flat-file vai SQLite aizmugursistēmā. Pakalpojumu
      sniedzēji darbojas vienlaicīgi ar konfigurējamu paralēlismu, pakalpojumu
      sniedzēja taimauta vērtībām, HTTP ātruma ierobežojumu pa resursdatoru,
      eksponenciālu atlaišanu un savienojumu apvienošanu. Visi izvades dati
      tiek apstiprināti pret JSON shēmu izpildlaikā. Pakāpeniski plūsmas
      atjauninājumi tiek atbalstīti, izmantojot laika zīmogu izsekošanu.

      vulnz tiek izplatīts kā viens statisks binārs fails bez izpildlaika
      atkarībām, paredzēts integrācijai automatizētos atbilstības cauruļvados,
      SBOM rīku ķēdēs un ievainojamību pārvaldības darbplūsmās visās ES
      dalībvalstīs.
    documentation: "https://codeberg.org/shift/vulnz/src/branch/main/docs"
    features:

version: 2
project_name: vulnz

builds:
  - env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/vulnz
    ldflags:
      - -s -w
      - -X github.com/shift/vulnz/internal/cli.Version={{.Version}}
      - -X github.com/shift/vulnz/internal/cli.Commit={{.Commit}}
      - -X github.com/shift/vulnz/internal/cli.BuildDate={{.Date}}
    binary: vulnz
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
      - goos: darwin
        goarch: amd64
        env:
          - CGO_ENABLED=0
        flags:
          - -tags
          - sqlite_modernc
      - goos: darwin
        goarch: arm64
        env:
          - CGO_ENABLED=0
        flags:
          - -tags
          - sqlite_modernc

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

source:
  enabled: true

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^ci:'
      - '^chore:'
